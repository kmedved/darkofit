name: tests

# Run the test suite on every PR and every push to main, so a red commit can't
# reach main and so PRs gate on green. Pair this with a branch-protection rule
# that requires the "tests" checks (Settings -> Branches -> add rule for main).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref cancels the older, still-running job.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # The full supported range from pyproject (requires-python >= 3.9).
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          # ChimeraBoost is developed on Windows -- keep one Windows job so
          # path/encoding/numba-threading regressions surface in CI too.
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: pytest -q
