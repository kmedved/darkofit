name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    env:
      NUMBA_NUM_THREADS: "4"
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,tuning]"
      - name: Run tests
        run: python -m pytest -q
