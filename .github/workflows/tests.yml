name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  library:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    env:
      NUMBA_NUM_THREADS: "4"
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Numba reads NUMBA_CACHE_DIR literally (os.path.join, no ~ expansion),
      # so resolve $HOME in a step instead of putting a tilde in the env block.
      - name: Set Numba cache dir
        run: echo "NUMBA_CACHE_DIR=$HOME/.cache/numba" >> "$GITHUB_ENV"
      - name: Cache Numba kernels
        uses: actions/cache@v4
        with:
          path: ~/.cache/numba
          key: ${{ runner.os }}-numba-py${{ matrix.python-version }}-${{ hashFiles('darkofit/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-numba-py${{ matrix.python-version }}-
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,tuning]"
      - name: Run library tests
        # The three historical M3b harness modules are hash-bound into the
        # frozen contract and cannot be retroactively marked. Their portable
        # checks run in the campaign lane; the published-result verifier stays
        # here and runs across every supported Python version.
        run: |
          python -m pytest -q -m "not campaign" \
            --ignore=tests/test_m3b_ensemble_v3.py \
            --ignore=tests/test_m3b_ensemble_v3_r2.py \
            --ignore=tests/test_m3b_ensemble_v3_r3.py

  campaign:
    runs-on: ubuntu-latest
    env:
      NUMBA_NUM_THREADS: "4"
      OMP_NUM_THREADS: "4"
      OPENBLAS_NUM_THREADS: "4"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set Numba cache dir
        run: echo "NUMBA_CACHE_DIR=$HOME/.cache/numba" >> "$GITHUB_ENV"
      - name: Cache Numba kernels
        uses: actions/cache@v4
        with:
          path: ~/.cache/numba
          key: ${{ runner.os }}-numba-campaign-py3.11-${{ hashFiles('darkofit/**/*.py', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-numba-campaign-py3.11-
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,tuning]"
      - name: Check out pinned ChimeraBoost exposure sources
        run: |
          git clone --depth 1 --branch v0.15.0 \
            https://github.com/bbstats/chimeraboost.git ../chimeraboost
          test "$(git -C ../chimeraboost rev-parse HEAD)" = \
            "851ab7fa79fbb2a7f698fbc1a00952e1bd18c62d"
      - name: Run campaign verifiers
        run: |
          python -m pytest -q -m campaign
          # These files predate their campaign-lane routing and are immutable
          # inputs to M3b. The freezer constructors require the intentionally
          # untracked sports-panel cache. The source-pin/live-tree checks are
          # pre-execution guards: after closure, the result verifier reads the
          # implementation inputs from the contract's historical Git pin.
          python -m pytest -q \
            tests/test_m3b_ensemble_v3.py \
            tests/test_m3b_ensemble_v3_r2.py \
            tests/test_m3b_ensemble_v3_r3.py \
            --deselect=tests/test_m3b_ensemble_v3.py::test_m3b_freezer_binds_source_cases_and_nonshipping_claims \
            --deselect=tests/test_m3b_ensemble_v3_r3.py::test_m3b_r3_uses_corrected_source_pin \
            --deselect=tests/test_m3b_ensemble_v3_r3.py::test_m3b_r3_freezer_binds_both_terminal_predecessors \
            --deselect=tests/test_m3b_ensemble_v3_r3.py::test_m3b_r3_frozen_contract_loads_when_present

  docs-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install documentation and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[docs]" build
      - name: Build documentation
        run: python -m mkdocs build --strict
      - name: Verify generated benchmark status
        run: python benchmarks/make_pareto.py --check
      - name: Build source and wheel distributions
        run: python -m build
