[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "chimeraboost"
version = "0.8.0"
description = "CatBoost-inspired gradient boosting in pure Python with a numba backend"
readme = "README.md"
requires-python = ">=3.9"
dependencies = [
    "numpy>=1.22",
    "numba>=0.57",
    "scikit-learn>=1.0",
    "scipy>=1.7",
]

[project.urls]
Homepage = "https://github.com/bbstats/chimeraboost"
Repository = "https://github.com/bbstats/chimeraboost"

[project.optional-dependencies]
dev = ["pytest"]

[tool.setuptools.packages.find]
include = ["chimeraboost*"]
